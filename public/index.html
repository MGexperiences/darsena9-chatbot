<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Townhouse Marina · Dársena 9</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#1a2535;--navy2:#243347;--gold:#c9a84c;--goldl:#e8cc88;
  --sand:#f7f3ed;--muted:#8a8278;--text:#2c2c2c;--border:#e8e0d4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:#0f1824;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:16px;
  background-image:radial-gradient(ellipse at 15% 30%,rgba(201,168,76,.07) 0%,transparent 55%),
                   radial-gradient(ellipse at 85% 70%,rgba(26,37,53,.9) 0%,transparent 60%);}
.widget{width:100%;max-width:460px;border-radius:24px;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.15);display:flex;flex-direction:column;}

/* INFO BAR */
.info-bar{background:#0f1824;padding:10px 18px;border-bottom:1px solid rgba(201,168,76,.1);
  display:flex;align-items:center;justify-content:space-between;}
.info-bar a{font-size:11px;color:var(--goldl);opacity:.7;text-decoration:none;letter-spacing:.4px;}
.info-bar a:hover{opacity:1;}
.info-links{display:flex;gap:14px;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a2535 0%,#243347 50%,#1a3a2a 100%);
  padding:20px 22px 18px;position:relative;overflow:hidden;}
.hdr::before{content:'⚓';position:absolute;right:18px;top:50%;transform:translateY(-50%);
  font-size:64px;opacity:.06;}
.hrow{display:flex;align-items:center;gap:12px;}
.av{width:46px;height:46px;background:var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
  border:2px solid rgba(201,168,76,.35);}
.ht h1{font-family:'Cormorant Garamond',serif;font-size:18px;color:#fff;font-weight:600;line-height:1.2;}
.ht p{font-size:11px;color:var(--goldl);font-weight:300;letter-spacing:.7px;margin-top:2px;}
.st{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:#7ec89a;white-space:nowrap;}
.sd{width:6px;height:6px;background:#7ec89a;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CONFIG */
.cbar{background:var(--navy2);padding:9px 18px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid rgba(201,168,76,.1);}
.cbar span{font-size:11px;color:var(--goldl);opacity:.6;letter-spacing:.5px;}
.ctog{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.2);
  border-radius:8px;padding:4px 11px;color:var(--goldl);cursor:pointer;
  font-family:'Jost',sans-serif;font-size:11px;transition:all .2s;}
.ctog:hover{background:rgba(201,168,76,.22);}
.cpanel{background:var(--navy2);border-bottom:1px solid rgba(201,168,76,.1);
  max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;}
.cpanel.open{max-height:200px;padding:16px 20px 18px;}
.cpanel h3{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--goldl);margin-bottom:10px;}
.cf{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.cf label{font-size:10px;font-weight:500;color:var(--goldl);text-transform:uppercase;letter-spacing:.8px;opacity:.65;}
.cf textarea{border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:8px 11px;
  font-family:'Jost',sans-serif;font-size:12.5px;color:#f0ead8;background:rgba(255,255,255,.05);
  outline:none;transition:border-color .2s;resize:vertical;}
.cf textarea:focus{border-color:var(--gold);}
.bsave{background:var(--gold);color:var(--navy);border:none;border-radius:10px;
  padding:8px 20px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;width:100%;}

/* CHAT */
.chat{background:var(--sand);height:420px;overflow-y:auto;padding:18px 14px;
  display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.msg{display:flex;flex-direction:column;max-width:86%;animation:fu .25s ease;}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.bbl{padding:11px 15px;border-radius:18px;font-size:13.5px;line-height:1.6;}
.msg.bot .bbl{background:#fff;color:var(--text);border-bottom-left-radius:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid var(--border);}
.msg.user .bbl{background:var(--navy);color:#f0ead8;border-bottom-right-radius:4px;}
.mt{font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px;}
.msg.user .mt{text-align:right;}
.typing{display:flex;align-items:center;gap:5px;padding:12px 15px;background:#fff;
  border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;
  width:fit-content;box-shadow:0 2px 8px rgba(0,0,0,.07);animation:fu .25s ease;}
.typing span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:bo 1.2s infinite;opacity:.7;}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes bo{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px);opacity:1}}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:15px;
  animation:fu .25s ease;max-width:95%;align-self:flex-start;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.card.gold-border{border-left:3px solid var(--gold);}
.card.navy-border{border-left:3px solid var(--navy);}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--navy);margin-bottom:5px;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:13px;line-height:1.5;}
.card-row{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);}
.card-row:last-of-type{border-bottom:none;}
.card-val{font-weight:500;color:var(--gold);}
.card-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5;}
.map-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;
  background:var(--navy);color:var(--goldl);padding:10px 14px;border-radius:10px;
  font-size:13px;font-weight:500;text-decoration:none;transition:background .2s;}
.map-btn:hover{background:var(--navy2);}

/* DATE / FORM INPUTS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.form-grid.full{grid-template-columns:1fr;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
.form-input{border:1px solid var(--border);border-radius:9px;padding:9px 11px;
  font-family:'Jost',sans-serif;font-size:13px;color:var(--text);background:var(--sand);outline:none;
  transition:border-color .2s;width:100%;}
.form-input:focus{border-color:var(--gold);}
.guest-list{display:flex;flex-direction:column;gap:7px;margin-bottom:9px;}
.guest-row{display:flex;gap:6px;align-items:center;}
.gnum{font-size:11px;color:var(--muted);min-width:16px;text-align:right;flex-shrink:0;}
.id-input{flex:1;border:1px solid var(--border);border-radius:9px;padding:8px 10px;
  font-family:'Jost',sans-serif;font-size:12.5px;color:var(--text);background:var(--sand);outline:none;}
.id-input:focus{border-color:var(--navy);}
.id-input::placeholder{color:var(--muted);}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:2px 4px;}
.del-btn:hover{color:#e55;}
.add-btn{background:transparent;border:1px dashed var(--border);border-radius:9px;padding:7px;
  font-family:'Jost',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;
  transition:all .2s;text-align:center;width:100%;margin-bottom:9px;}
.add-btn:hover{border-color:var(--navy);color:var(--navy);}
.submit-btn{background:var(--navy);color:var(--goldl);border:none;border-radius:10px;
  padding:10px 16px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:background .2s;width:100%;margin-top:4px;}
.submit-btn:hover{background:var(--navy2);}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;}

/* WA CARD */
.wa-card{background:#f0faf4;border:1px solid #b8dfc7;border-radius:14px;padding:13px 15px;
  display:flex;align-items:flex-start;gap:10px;animation:fu .25s ease;max-width:88%;align-self:flex-start;}
.wa-card .wicon{font-size:22px;flex-shrink:0;margin-top:1px;}
.wa-card .wbody{font-size:13px;color:#2d6a4f;line-height:1.45;width:100%;}
.wa-card .wbody strong{display:block;font-weight:500;margin-bottom:3px;}
.wa-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:9px;
  color:#fff;padding:10px 16px;border-radius:12px;
  font-size:13px;font-weight:600;text-decoration:none;transition:background .2s;}

/* QUICK ACTIONS */
.qa{background:#fff;border-top:1px solid var(--border);padding:10px 12px;
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.qa::-webkit-scrollbar{display:none;}
.qbtn{background:var(--sand);border:1px solid var(--border);border-radius:20px;
  padding:6px 12px;font-family:'Jost',sans-serif;font-size:12px;color:var(--text);
  cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.qbtn:hover,.qbtn.active-btn{background:var(--navy);border-color:var(--navy);color:var(--goldl);}

/* INPUT */
.inp-area{background:#fff;padding:11px 13px 15px;border-top:1px solid var(--border);
  display:flex;gap:9px;align-items:flex-end;}
.inpw{flex:1;background:var(--sand);border:1px solid var(--border);border-radius:18px;
  padding:9px 14px;transition:border-color .2s;}
.inpw:focus-within{border-color:var(--gold);}
.inpw textarea{width:100%;border:none;background:transparent;font-family:'Jost',sans-serif;
  font-size:13.5px;color:var(--text);outline:none;resize:none;max-height:90px;line-height:1.5;}
.inpw textarea::placeholder{color:var(--muted);}
.sbtn{width:40px;height:40px;background:var(--navy);border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
  box-shadow:0 3px 10px rgba(26,37,53,.3);}
.sbtn:hover{transform:scale(1.05);}
.sbtn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.sbtn svg{width:17px;height:17px;fill:var(--gold);}
.divider{text-align:center;font-size:10.5px;color:var(--muted);letter-spacing:.5px;padding:2px 0;}

/* OTHER QUESTIONS FORM */
.other-form{display:flex;flex-direction:column;gap:9px;}
.other-form textarea{border:1px solid var(--border);border-radius:10px;padding:10px 13px;
  font-family:'Jost',sans-serif;font-size:13px;color:var(--text);background:var(--sand);
  outline:none;resize:none;width:100%;}
.other-form textarea:focus{border-color:var(--gold);}

/* RETURNING GUEST BANNER */
.return-banner{background:linear-gradient(135deg,#1a3a2a,#1a2535);border:1px solid rgba(201,168,76,.25);
  border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:10px;
  animation:fu .25s ease;max-width:95%;align-self:flex-start;}
.return-banner .rb-icon{font-size:20px;flex-shrink:0;}
.return-banner .rb-body{flex:1;}
.return-banner .rb-name{font-size:14px;font-weight:500;color:var(--goldl);margin-bottom:2px;}
.return-banner .rb-dates{font-size:12px;color:rgba(232,204,136,.6);}
.return-banner .rb-clear{background:none;border:1px solid rgba(201,168,76,.2);border-radius:8px;
  padding:5px 10px;font-family:'Jost',sans-serif;font-size:11px;color:rgba(232,204,136,.5);
  cursor:pointer;transition:all .2s;white-space:nowrap;}
.return-banner .rb-clear:hover{border-color:rgba(201,168,76,.5);color:var(--goldl);}
</style>
</head>
<body>
<div class="widget">

  <!-- INFO BAR -->
  <div class="info-bar">
    <span style="font-size:11px;color:var(--goldl);opacity:.5;letter-spacing:.4px;">🏡 Dársena 9 · Casa de Campo</span>
    <div class="info-links">
      <a href="https://www.airbnb.com/h/darsena9" target="_blank">Airbnb listing ↗</a>
      <a href="https://www.casadecampo.com.do" target="_blank">Casa de Campo ↗</a>
    </div>
  </div>

  <!-- HEADER -->
  <div class="hdr">
    <div class="hrow">
      <div class="av">🏡</div>
      <div class="ht">
        <h1>Townhouse Marina · Dársena 9</h1>
        <p>Casa de Campo · La Marina · Dominican Republic</p>
      </div>
      <div class="st"><div class="sd"></div>Online</div>
    </div>
  </div>

  <!-- CONFIG BAR -->
  <div class="cbar">
    <span>⚙ Host panel</span>
    <button class="ctog" onclick="toggleCfg()">Configure stay</button>
  </div>
  <div class="cpanel" id="cpanel">
    <h3>Active reservation notes</h3>
    <div class="cf">
      <label>Special notes for this stay</label>
      <textarea id="extra-notes" rows="2" placeholder="e.g. golf cart assigned, special requests..."></textarea>
    </div>
    <button class="bsave" onclick="saveCfg()">💾 Save</button>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat">
    <div class="divider" id="today-divider">Today · <span id="wt"></span></div>
    <div class="msg bot">
      <div class="bbl" id="welcome-msg"></div>
      <div class="mt" id="wt2"></div>
    </div>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="qa" id="qa-bar"></div>

  <!-- INPUT -->
  <div class="inp-area">
    <div class="inpw">
      <textarea id="inp" rows="1" placeholder="Type your question…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="sbtn" id="sbtn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────
const GDRIVE_SCRIPT = 'https://script.google.com/macros/s/AKfycbzz3yaqNPRAJQvt7dohZPX91zcMasBvZ5ebNarsI0L8oPFmkWDXtGaR9ZPgcxhz0ApiNw/exec';
const FOLDER_ID     = '1WMsYjyFwfNJJsa-ifOp3zAKowx4C1HKC';
const LS_KEY        = 'd9_guest_v1'; // versión para poder invalidar en el futuro

// ── State ─────────────────────────────────────────────────────────
let cfg   = { extraNotes:'' };
let hist  = [], busy = false;
let lang  = 'en';
let uploadedPhotos = [];
let guestCount = 1;
let reservationDates = { checkin:'', checkout:'' };
let guestName = '';

// ── localStorage helpers ──────────────────────────────────────────
function saveGuestToLS() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      name:     guestName,
      checkin:  reservationDates.checkin,
      checkout: reservationDates.checkout,
      lang:     lang,
      saved:    new Date().toISOString()
    }));
  } catch(e) { console.warn('localStorage not available:', e); }
}

function loadGuestFromLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const g = JSON.parse(raw);
    // Solo válido si el checkout no pasó todavía
    if (g.checkout && new Date(g.checkout + 'T23:59:59') >= new Date()) {
      return g;
    }
    // Expirado: limpiar
    localStorage.removeItem(LS_KEY);
    return null;
  } catch(e) { return null; }
}

function clearGuestFromLS() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  guestName = '';
  reservationDates = { checkin:'', checkout:'' };
  window.docsSubmitted = false;
}

// ── Init ──────────────────────────────────────────────────────────
const T = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
document.getElementById('wt').textContent  = T;
document.getElementById('wt2').textContent = T;

// Mostrar selector de idioma
document.getElementById('welcome-msg').innerHTML =
  `<span style="font-size:15px;font-weight:500;color:var(--navy)">¡Hola! 👋  Hello!</span><br>
  <span style="font-size:13px;color:var(--muted)">Choose your language · Elegí tu idioma</span>
  <div style="display:flex;gap:10px;margin-top:12px;">
    <button onclick="setLang('en')" style="flex:1;padding:13px;background:var(--navy);color:var(--goldl);border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;cursor:pointer;font-weight:500;letter-spacing:.3px;">🇺🇸 English</button>
    <button onclick="setLang('es')" style="flex:1;padding:13px;background:var(--navy);color:var(--goldl);border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;cursor:pointer;font-weight:500;letter-spacing:.3px;">🇩🇴 Español</button>
  </div>`;

hist.push({role:'assistant', content:'Greeted guest and showed language selector.'});

// ── Config ────────────────────────────────────────────────────────
function toggleCfg(){ document.getElementById('cpanel').classList.toggle('open'); }
function saveCfg(){
  cfg.extraNotes = document.getElementById('extra-notes').value.trim();
  document.getElementById('cpanel').classList.remove('open');
  addBot(lang==='es'?'✅ Notas guardadas.':'✅ Notes saved.');
}

// ── Language setup ────────────────────────────────────────────────
function setLang(l){
  lang = l;
  document.getElementById('inp').placeholder = l==='es'?'Escribí tu consulta…':'Type your question…';

  // Quick actions bar
  const qa = document.getElementById('qa-bar');
  qa.innerHTML = l==='es'
    ? `<button class="qbtn" onclick="startIDFlow()">🔑 Acceso al resort</button>
       <button class="qbtn" onclick="askMsg('¿Cuál es el WiFi y la contraseña?')">📶 WiFi</button>
       <button class="qbtn" onclick="showGolfForm()">🛺 Carrito de golf</button>
       <button class="qbtn" onclick="askMsg('¿Cuáles son los horarios de check-in y check-out?')">🕐 Horarios</button>
       <button class="qbtn" onclick="askMsg('¿El BBQ funciona y cómo se usa?')">🔥 BBQ</button>
       <button class="qbtn" onclick="askMsg('¿Qué actividades hay en Casa de Campo?')">🌴 Actividades</button>
       <button class="qbtn" onclick="askMsg('¿Qué restaurantes hay en La Marina?')">🍽 Restaurantes</button>
       <button class="qbtn" onclick="showSupermarket()">🛒 Supermercado</button>
       <button class="qbtn" onclick="askMsg('¿Cuánto es la tarifa del resort Casa de Campo?')">🏖 Tarifa resort</button>
       <button class="qbtn" onclick="showOtherForm()">💬 Otras consultas</button>`
    : `<button class="qbtn" onclick="startIDFlow()">🔑 Resort access</button>
       <button class="qbtn" onclick="askMsg('What is the WiFi name and password?')">📶 WiFi</button>
       <button class="qbtn" onclick="showGolfForm()">🛺 Golf cart</button>
       <button class="qbtn" onclick="askMsg('What are the check-in and check-out times?')">🕐 Hours</button>
       <button class="qbtn" onclick="askMsg('Does the BBQ work and how do I use it?')">🔥 BBQ</button>
       <button class="qbtn" onclick="askMsg('What activities are available at Casa de Campo?')">🌴 Activities</button>
       <button class="qbtn" onclick="askMsg('What restaurants are at the Marina?')">🍽 Restaurants</button>
       <button class="qbtn" onclick="showSupermarket()">🛒 Supermarket</button>
       <button class="qbtn" onclick="askMsg('What is the Casa de Campo resort fee?')">🏖 Resort fee</button>
       <button class="qbtn" onclick="showOtherForm()">💬 Other questions</button>`;

  // ── Sheet siempre tiene prioridad — localStorage es fallback ────
  document.getElementById('welcome-msg').innerHTML = l==='es'
    ? `¡Bienvenidos al <strong>Townhouse Marina · Dársena 9</strong> en Casa de Campo 🌴<br><br><span style="font-size:12px;color:var(--muted)">Consultando tu reserva…</span>`
    : `Welcome to <strong>Townhouse Marina · Dársena 9</strong> at Casa de Campo 🌴<br><br><span style="font-size:12px;color:var(--muted)">Checking your reservation…</span>`;
  fetchSheet(l);
}

// ── Fetch Sheet y detectar reserva activa ────────────────────────
async function fetchSheet(l) {
  try {
    const r    = await fetch('/api/sheet');
    const data = await r.json();

    if (!data.success || !data.found) {
      showNewGuestWelcome(l);
      return;
    }

    const name         = data.guestName    || '';
    const checkin      = data.checkin      || '';
    const checkout     = data.checkout     || '';
    const integrantes  = data.integrantes  || '';
    const codigoResort = data.codigoResort || '';
    const first        = name.split(' ')[0];

    guestName        = name;
    reservationDates = { checkin: checkin, checkout: checkout };
    // Actualizar localStorage con datos del Sheet (fuente de verdad)
    saveGuestToLS();

    document.getElementById('welcome-msg').innerHTML = l==='es'
      ? `¡Bienvenido al <strong>Townhouse Marina · Dársena 9</strong> 🌴<br><br>Soy el asistente de Pilar. ¿En qué puedo ayudarte?`
      : `Welcome to <strong>Townhouse Marina · Dársena 9</strong> at Casa de Campo 🌴<br><br>I'm Pilar's assistant. How can I help you?`;

    // Mostrar UN solo elemento según el estado
    const hasDocs = integrantes  && integrantes  !== '—' && integrantes  !== '';
    const hasCode = codigoResort && codigoResort !== '—' && codigoResort !== '';
    setTimeout(() => {
      if (hasCode) {
        showResortCodeCard(first, codigoResort, checkin, checkout, l);
      } else if (hasDocs) {

async function uploadToDrive(photos){
  const photoData = photos.map((p,i)=>({
    data: p.dataUrl.split(',')[1],
    type: p.file ? p.file.type : 'image/jpeg',
    name: `doc${i+1}.jpg`
  }));
  try {
    const r = await fetch("/api/drive-upload", {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        photos: photoData,
        guestCount: photos.length,
        guestName: guestName || 'Guest',
        checkin: fmt(reservationDates.checkin),
        checkout: fmt(reservationDates.checkout),
        folderId: FOLDER_ID
      })
    });
    const result = await r.json();
    return result.success;
  } catch(e){
    console.error('Drive upload error:', e);
    return false;
  }
}

// ── AI call ───────────────────────────────────────────────────────
async function callAI(){
  if(busy) return;
  busy=true; document.getElementById('sbtn').disabled=true;
  showTyping();
  try{
    const r = await fetch("/api/chat",{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ system: sys(), messages: hist })
    });
    if(!r.ok) throw new Error('HTTP error: ' + r.status);
    const data = await r.json();
    rmTyping();
    if(data.error) throw new Error(data.error);
    const raw = (data.reply || '').trim();
    let esc=false, sum='';
    try{ const p=JSON.parse(raw); if(p.escalate){esc=true; sum=p.summary||'';} }catch(_){}

    if(esc){
      addBot(lang==='es'
        ?'Para esto es mejor que hables directamente con Pilar por Airbnb — ella te va a responder a la brevedad 🙏'
        :'For this it\'s best to contact Pilar directly on Airbnb — she\'ll reply as soon as possible 🙏');
      try {
        await fetch('/api/drive-upload', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            type: 'question',
            question: sum || hist[hist.length-2]?.content || '(consulta escalada)',
            guestName: guestName || 'Guest',
            checkin: fmt(reservationDates.checkin) || 'No especificado',
            checkout: fmt(reservationDates.checkout) || 'No especificado',
            photos: [],
            folderId: FOLDER_ID
          })
        });
      } catch(e2){ console.error('Escalation notify error:', e2); }
      const c=document.getElementById('chat');
      const d=document.createElement('div');
      d.className='wa-card';
      d.innerHTML=`<div class="wicon">💬</div>
        <div class="wbody">
          <strong>${lang==='es'?'Contactá a Pilar por Airbnb':'Contact Pilar on Airbnb'}</strong>
          <a class="wa-link" href="https://www.airbnb.com/messaging/inbox" target="_blank" style="background:#FF5A5F;margin-top:9px;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;text-decoration:none;color:#fff;">
            🏠 ${lang==='es'?'Ir al chat de Airbnb':'Go to Airbnb chat'}
          </a>
        </div>`;
      c.appendChild(d); c.scrollTop=c.scrollHeight;
      hist.push({role:'assistant', content:'Escalated to Pilar via Airbnb.'});
    } else {
      addBot(raw);
      hist.push({role:'assistant', content:raw});
      const accessKeywords = ['código de acceso','code','documentos','documents','pasaporte','passport','identidad','identity','acceso al resort','resort access'];
      if(accessKeywords.some(k => raw.toLowerCase().includes(k))){
        addAccessBtn();
      }
    }
  } catch(e){
    rmTyping();
    addBot(lang==='es'
      ?'Uy, tuve un problemita técnico 😅 Podés escribirle a Pilar directamente por Airbnb.'
      :'Oops, I had a small technical issue 😅 You can contact Pilar directly on Airbnb.');
  }
  busy=false; document.getElementById('sbtn').disabled=false;
}

    <button class="submit-btn" onclick="submitNameOnly()">${lang==='es'?'Confirmar →':'Confirm →'}</button>
  `, 'navy-border');
}

function submitNameOnly(){
  const firstname = document.getElementById('guest-firstname')?.value.trim();
  const lastname  = document.getElementById('guest-lastname')?.value.trim();
  if(!firstname||!lastname){ alert(lang==='es'?'Ingresá nombre y apellido.':'Please enter first and last name.'); return; }
  guestName = `${firstname} ${lastname}`;
  saveGuestToLS();
  document.querySelectorAll('.card').forEach(c=>c.remove());
  addUser(`${guestName}`);
  hist.push({role:'user', content:`Guest name: ${guestName}. Dates already known: ${reservationDates.checkin} to ${reservationDates.checkout}`});
  addBot(lang==='es'
    ?`¡Gracias, <strong>${firstname}</strong>! Ahora necesito el documento de identidad de cada integrante:`
    :`Thanks, <strong>${firstname}</strong>! Now I need the ID document for each guest:`);
  setTimeout(showIDCard, 350);
}

function showDateCard(){
  const today = new Date().toISOString().split('T')[0];
  addCard(`
    <div class="card-title">📋 ${lang==='es'?'Datos de la reserva':'Reservation details'}</div>
    <div class="card-sub">${lang==='es'?'Completá los datos del huésped principal.':'Please fill in the main guest details.'}</div>
    <div class="form-grid">
      <div class="form-field"><label>${lang==='es'?'Nombre':'First name'}</label>
        <input type="text" class="form-input" id="guest-firstname" placeholder="${lang==='es'?'ej. María':'e.g. Maria'}"></div>
      <div class="form-field"><label>${lang==='es'?'Apellido':'Last name'}</label>
        <input type="text" class="form-input" id="guest-lastname" placeholder="${lang==='es'?'ej. González':'e.g. Smith'}"></div>
    </div>
    <div class="form-grid">
      <div class="form-field"><label>Check-in</label>
        <input type="date" class="form-input" id="date-ci" min="${today}"></div>
      <div class="form-field"><label>Check-out</label>
        <input type="date" class="form-input" id="date-co" min="${today}"></div>
    </div>
    <button class="submit-btn" onclick="submitDates()">${lang==='es'?'Confirmar →':'Confirm →'}</button>
  `, 'navy-border');
}

function submitDates(){
  const firstname = document.getElementById('guest-firstname')?.value.trim();
  const lastname  = document.getElementById('guest-lastname')?.value.trim();
  const ci = document.getElementById('date-ci')?.value;
  const co = document.getElementById('date-co')?.value;
  if(!firstname||!lastname){ alert(lang==='es'?'Ingresá nombre y apellido.':'Please enter first and last name.'); return; }
  if(!ci||!co){ alert(lang==='es'?'Ingresá ambas fechas.':'Please enter both dates.'); return; }
  if(co<=ci){ alert(lang==='es'?'Check-out debe ser posterior.':'Check-out must be after check-in.'); return; }

  guestName = `${firstname} ${lastname}`;
  reservationDates = {checkin:ci, checkout:co};

  // ── Guardar en localStorage ────────────────────────────────────
  saveGuestToLS();

  document.querySelectorAll('.card').forEach(c=>c.remove());
  addUser(`${guestName}\nCheck-in: ${fmt(ci)}\nCheck-out: ${fmt(co)}`);
  hist.push({role:'user', content:`Guest: ${guestName}. Stay: ${ci} to ${co}`});
  addBot(lang==='es'
    ?`¡Gracias, <strong>${firstname}</strong>! Del <strong>${fmt(ci)}</strong> al <strong>${fmt(co)}</strong> 📅<br><br>Ahora necesito el documento de identidad de cada integrante del viaje:`
    :`Thanks, <strong>${firstname}</strong>! From <strong>${fmt(ci)}</strong> to <strong>${fmt(co)}</strong> 📅<br><br>Now I need the ID document for each guest in your group:`);
  setTimeout(showIDCard, 350);
}

function showIDCard(){
  addCard(`
    <div class="card-title">🛂 ${lang==='es'?'Documentos de identidad':'ID Documents'}</div>
    <div class="card-sub">${lang==='es'?'Ingresá el nombre completo y número de documento de cada integrante.':'Enter the full name and document number for each guest.'}</div>
    <div class="guest-list" id="guest-list">
      <div class="guest-row" id="grow-1">
        <span class="gnum">1.</span>
        <input class="id-input" placeholder="${lang==='es'?'Nombre completo':'Full name'}" id="gname-1" style="flex:1.4">
        <input class="id-input" placeholder="${lang==='es'?'N° pasaporte/doc':'Passport/ID number'}" id="gdoc-1" style="flex:1">
      </div>
    </div>
    <button class="add-btn" onclick="addGuestRow()">+ ${lang==='es'?'Agregar integrante':'Add guest'}</button>
    <button class="submit-btn" onclick="submitText()">${lang==='es'?'Enviar datos →':'Send details →'}</button>
  `, 'navy-border');
}

function addGuestRow(){
  guestCount++;
  const list=document.getElementById('guest-list');
  const r=document.createElement('div'); r.className='guest-row'; r.id=`grow-${guestCount}`;
  r.innerHTML=`<span class="gnum">${guestCount}.</span>
    <input class="id-input" placeholder="${lang==='es'?'Nombre completo':'Full name'}" id="gname-${guestCount}" style="flex:1.4">
    <input class="id-input" placeholder="${lang==='es'?'N° pasaporte/doc':'Passport/ID number'}" id="gdoc-${guestCount}" style="flex:1">
    <button class="del-btn" onclick="this.closest('.guest-row').remove()">×</button>`;
  list.appendChild(r);
}

async function submitText(){
  let guests=[],incomplete=false;
  document.querySelectorAll('.guest-row').forEach((row,idx)=>{
    const n=(row.querySelector('[id^=gname]')?.value||'').trim();
    const doc=(row.querySelector('[id^=gdoc]')?.value||'').trim();
    if(n||doc){ if(!n||!doc){incomplete=true;} else guests.push(`${idx+1}. ${n} — ${doc}`); }
  });
  if(!guests.length){ alert(lang==='es'?'Ingresá al menos un integrante.':'Please enter at least one guest.'); return; }
  if(incomplete){ alert(lang==='es'?'Completá nombre y número de documento para cada persona.':'Please complete both name and document number for each person.'); return; }

  document.querySelectorAll('.card').forEach(c=>c.remove());
  document.querySelectorAll('.access-btn-row').forEach(el=>el.remove());
  window.docsSubmitted = true;
  const listTxt=guests.join('\n');
  addUser(lang==='es'?`Datos de integrantes:\n${listTxt}`:`Guest details:\n${listTxt}`);
  hist.push({role:'user', content:`Guest details: ${listTxt}. Dates: ${reservationDates.checkin} to ${reservationDates.checkout}`});

  addBot(lang==='es'
    ?`¡Perfecto, muchas gracias! 🙏 Recibí los datos de ${guests.length} integrante${guests.length>1?'s':''}.<br><br>Le aviso a Pilar para que genere el código de acceso. Te lo va a enviar por Airbnb en breve 😊<br><br>🗓 <strong>Tu reserva:</strong><br>• 📅 Check-in: ${fmt(reservationDates.checkin)} a partir de las <strong>3:00 PM</strong><br>• 📅 Check-out: ${fmt(reservationDates.checkout)} hasta las <strong>11:00 AM</strong><br><br>🔑 El portallaves está a la <strong>izquierda de la puerta principal</strong> · Código: <strong>0926</strong><br><br>📌 <strong>Tarifas del resort al ingreso:</strong><br>• 👤 USD 30 por adulto / noche<br>• 👧 USD 15 por niño (4-12 años) / noche<br>• 🍼 Menores de 4 años: sin cargo<br><br>¡Cualquier cosa me avisás! 😊`
    :`Thank you! 🙏 I received the details for ${guests.length} guest${guests.length>1?'s':''}.<br><br>I'm notifying Pilar to generate your resort access code. She'll send it via Airbnb shortly 😊<br><br>🗓 <strong>Your reservation:</strong><br>• 📅 Check-in: ${fmt(reservationDates.checkin)} from <strong>3:00 PM</strong><br>• 📅 Check-out: ${fmt(reservationDates.checkout)} by <strong>11:00 AM</strong><br><br>🔑 Lockbox is to the <strong>left of the main door</strong> · Code: <strong>0926</strong><br><br>📌 <strong>Resort fees at arrival:</strong><br>• 👤 USD 30 per adult / night<br>• 👧 USD 15 per child (4-12 yrs) / night<br>• 🍼 Under 4 years: free<br><br>Let me know if you need anything! 😊`);

  try {
    await fetch('/api/drive-upload', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        type: 'guests',
        guestName: guestName || guests[0]?.split('—')[0]?.trim() || 'Guest',
        guests: listTxt,
        checkin: fmt(reservationDates.checkin),
        checkout: fmt(reservationDates.checkout),
        checkinRaw: reservationDates.checkin,
        checkoutRaw: reservationDates.checkout,
        photos: [],
        folderId: FOLDER_ID
      })
    });
  } catch(e){ console.error('Notification error:', e); }

  // Mostrar fotos del lockbox
  setTimeout(showLockboxImages, 800);

  addWACard('', `<strong>${lang==='es'?'✅ Pilar fue notificada':'✅ Pilar was notified'}</strong>${lang==='es'?'<br>Te responderá por Airbnb en breve.':'<br>She\'ll reply via Airbnb shortly.'}`);
  hist.push({role:'assistant', content:'Guest details sent to Pilar.'});
}

function showLockboxImages(){
  const c=document.getElementById('chat');
  const imgCard=document.createElement('div');
  imgCard.className='card gold-border';
  imgCard.style.maxWidth='95%';
  imgCard.innerHTML=`
    <div class="card-title">🔑 ${lang==='es'?'Acceso a la propiedad':'Property access'}</div>
    <div class="card-sub" style="margin-bottom:10px;">${lang==='es'?'El portallaves está a la izquierda de la puerta principal. Código: <strong>0926</strong>':'The lockbox is to the left of the main door. Code: <strong>0926</strong>'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">${lang==='es'?'Portallaves':'Lockbox'}</div>
        <img src="https://drive.google.com/thumbnail?id=1VuXMrq0aFq6nKOWawYlgMrKtIjg_O_fF&sz=w400"
             style="width:100%;border-radius:10px;object-fit:cover;height:140px;"
             onerror="this.style.display='none'">
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">${lang==='es'?'Puerta principal':'Main door'}</div>
        <img src="https://drive.google.com/thumbnail?id=19gAxOLyaHtXx_8AwoQP7etBt3ip-mzRF&sz=w400"
             style="width:100%;border-radius:10px;object-fit:cover;height:140px;"
             onerror="this.style.display='none'">
      </div>

  c.appendChild(imgCard);

}

// ── GOLF CART FORM ────────────────────────────────────────────────
function showGolfForm(){
  addUser(lang==='es'?'¿Tienen carrito de golf?':'Is a golf cart available?');
  hist.push({role:'user',content:'Asking about golf cart.'});
  const today = new Date().toISOString().split('T')[0];
  addCard(`
    <div class="card-title">🛺 ${lang==='es'?'Reserva de Carrito de Golf':'Golf Cart Reservation'}</div>
    <div class="card-sub">${lang==='es'?'Completá los datos para que Pilar te confirme y envíe el link de pago por Airbnb.':'Fill in the details and Pilar will confirm and send the payment link via Airbnb.'}</div>
    <div class="form-grid">
      <div class="form-field"><label>${lang==='es'?'Desde':'From'}</label>
        <input type="date" class="form-input" id="gc-from" min="${today}"></div>
      <div class="form-field"><label>${lang==='es'?'Hasta':'Until'}</label>
        <input type="date" class="form-input" id="gc-to" min="${today}"></div>
    </div>
    <div class="form-grid full">
      <div class="form-field"><label>${lang==='es'?'Capacidad':'Capacity'}</label>
        <select class="form-input" id="gc-size">
          <option value="4">4 ${lang==='es'?'pasajeros — USD 70/día':'passengers — USD 70/day'}</option>
          <option value="6">6 ${lang==='es'?'pasajeros — USD 100/día':'passengers — USD 100/day'}</option>
        </select>
      </div>
    </div>
    <div class="card-note" style="margin-bottom:10px;">💳 ${lang==='es'?'Pago exclusivo por Airbnb. Pilar envía el link de cobro.':'Payment via Airbnb only. Pilar sends the payment link.'}</div>
    <button class="submit-btn" onclick="submitGolfForm()">${lang==='es'?'Solicitar carrito →':'Request golf cart →'}</button>
  `, 'gold-border');
}

async function submitGolfForm(){
  const from = document.getElementById('gc-from')?.value;
  const to   = document.getElementById('gc-to')?.value;
  const size = document.getElementById('gc-size')?.value;
  if(!from||!to){ alert(lang==='es'?'Ingresá las fechas.':'Please enter the dates.'); return; }
  if(to<=from){ alert(lang==='es'?'La fecha "hasta" debe ser posterior.':'End date must be after start date.'); return; }

  const days = Math.ceil((new Date(to)-new Date(from))/(1000*60*60*24));
  const price = size==='4'?70:100;
  const total = days*price;

  document.querySelectorAll('.card').forEach(c=>c.remove());
  addUser(lang==='es'
    ?`Carrito ${size} pax · ${fmt(from)} al ${fmt(to)} · ${days} día${days>1?'s':''}`
    :`Golf cart ${size} pax · ${fmt(from)} to ${fmt(to)} · ${days} day${days>1?'s':''}`);

  addBot(lang==='es'
    ?`¡Perfecto! 🛺 Le mando la solicitud a Pilar ahora mismo.<br><br><strong>Resumen:</strong><br>• Carrito: ${size} pasajeros<br>• Fechas: ${fmt(from)} al ${fmt(to)}<br>• Días: ${days}<br>• Total estimado: USD ${total}<br><br>Pilar te va a enviar el link de pago por Airbnb en breve. ¡Cualquier cosa me avisás! 😊`
    :`Perfect! 🛺 I'm sending your request to Pilar right now.<br><br><strong>Summary:</strong><br>• Golf cart: ${size} passengers<br>• Dates: ${fmt(from)} to ${fmt(to)}<br>• Days: ${days}<br>• Estimated total: USD ${total}<br><br>Pilar will send you the payment link via Airbnb shortly. Let me know if you need anything! 😊`);

  try {
    await fetch('/api/drive-upload', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        type: 'golf',
        size: size,
        from: fmt(from),
        to: fmt(to),
        fromRaw: from,
        toRaw: to,
        days: days,
        total: total,
        photos: [],
        guestName: guestName || 'Guest',
        checkin: fmt(from),
        checkout: fmt(to),
        folderId: FOLDER_ID
      })
    });
  } catch(e){ console.error('Golf notification error:', e); }

  addWACard('',`<strong>${lang==='es'?'✅ Solicitud enviada a Pilar':'✅ Request sent to Pilar'}</strong>${lang==='es'?'<br>Te enviará el link de pago por Airbnb.':'<br>She\'ll send you the payment link via Airbnb.'}`);
  hist.push({role:'assistant', content:`Golf cart ${size}pax requested for ${days} days. Pilar notified.`});
}

// ── OTHER QUESTIONS ───────────────────────────────────────────────
function showOtherForm(){
  addUser(lang==='es'?'Tengo otra consulta':'I have another question');
  hist.push({role:'user', content:'Wants to ask a custom question.'});
  addCard(`
    <div class="card-title">💬 ${lang==='es'?'Otras consultas':'Other questions'}</div>
    <div class="card-sub">${lang==='es'?'Escribí tu consulta y se la enviamos a Pilar por email.':'Write your question and we\'ll send it to Pilar by email.'}</div>
    <div class="other-form">
      <textarea id="other-msg" rows="4" placeholder="${lang==='es'?'Describí tu consulta…':'Describe your question…'}"></textarea>
      <button class="submit-btn" onclick="submitOtherForm()">${lang==='es'?'Enviar consulta →':'Send question →'}</button>
    </div>
  `, 'navy-border');
}

async function submitOtherForm(){
  const msg = document.getElementById('other-msg')?.value.trim();
  if(!msg){ alert(lang==='es'?'Escribí tu consulta primero.':'Please write your question first.'); return; }

  document.querySelectorAll('.card').forEach(c=>c.remove());
  addUser(msg);
  hist.push({role:'user', content:msg});
  addBot(lang==='es'?'Recibí tu consulta, se la reenvío a Pilar ahora mismo 🙏':'Got your question, forwarding it to Pilar right now 🙏');

  try {
    await fetch('/api/drive-upload', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        type: 'question',
        question: msg,
        guestName: guestName || 'Guest',
        checkin: fmt(reservationDates.checkin) || 'No especificado',
        checkout: fmt(reservationDates.checkout) || 'No especificado',
        photos: [],
        folderId: FOLDER_ID
      })
    });
  } catch(e){ console.error('Question notification error:', e); }

  addWACard('',`<strong>${lang==='es'?'✅ Consulta enviada a Pilar':'✅ Question sent to Pilar'}</strong>${lang==='es'?'<br>Te responderá por Airbnb en breve.':'<br>She\'ll reply via Airbnb shortly.'}`);
  hist.push({role:'assistant', content:`Forwarded question to Pilar: "${msg}"`});
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }
